<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">

  <title>Savings Tracker</title>
  <style>
    :root { --radius: 8px; --border-strong: #ccc; --surface-1: #e4e8ff; --surface-2: #ffffff;--text-primary: #111;--text-secondary: #666;--text-muted: #999; --border: #e0e0e0;}
     h2.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);}
     *{box-sizing:border-box;margin:0;padding:0;}
     .app{font-family:'DM Sans',var(--font-sans),sans-serif;padding:1rem 0;max-width:420px;}

     .month-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem;}
     .month-nav{background: var(--surface-2);border:0.5px solid var(--border-strong);border-radius:var(--radius);width:34px;height:34px;cursor:pointer;color:var(--text-secondary);font-size:18px;display:flex;align-items:center;justify-content:center;}
     .month-nav:hover{background:var(--surface-1);color:var(--text-primary);}
     .month-title{font-size:17px;font-weight:500;color:var(--text-primary);}

     .summary-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:1rem;}
     .stat{border-radius:12px;padding:0.9rem 1rem;}
     .stat.income-bg{background:#EAF3DE;border:0.5px solid #C0DD97;}
     .stat.expense-bg{background:#FCEBEB;border:0.5px solid #F7C1C1;}
     .stat-label{font-size:12px;font-weight:500;margin-bottom:4px;}
     .stat-label.income{color:#3B6D11;}
     .stat-label.expense{color:#A32D2D;}
     .stat-value{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;}
     .stat-value.income{color:#27500A;}
     .stat-value.expense{color:#791F1F;}

     .target-card{background:#E6F1FB;border:0.5px solid #B5D4F4;border-radius:12px;padding:1rem 1.1rem;margin-bottom:1rem;}
     .target-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
     .target-label{font-size:13px;font-weight:500;color:#185FA5;}
     .target-edit-btn{background:none;border:0.5px solid #85B7EB;border-radius:6px;padding:3px 10px;font-size:12px;color:#185FA5;cursor:pointer;font-family:'DM Sans',sans-serif;}
     .target-edit-btn:hover{background:#B5D4F4;}
     .target-nums{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px;margin-bottom:10px;}
     .tnum{text-align:center;}
     .tnum-val{font-family:'DM Mono',monospace;font-size:18px;font-weight:500;color:#0C447C;}
     .tnum-lbl{font-size:11px;color:#185FA5;margin-top:2px;}
     .progress-track{height:8px;background:#B5D4F4;border-radius:99px;overflow:hidden;}
     .progress-fill{height:100%;border-radius:99px;background:#378ADD;transition:width 0.4s ease;}

     .target-input-row{display:flex;gap:8px;margin-bottom:10px;align-items:flex-end;}
     .target-input-row input{flex:1;height:40px;border-radius:var(--radius);border:0.5px solid #85B7EB;background:#fff;color:#0C447C;font-size:15px;padding:0 12px;font-family:'DM Mono',monospace;}
     .target-input-row button{height:40px;padding:0 14px;border-radius:var(--radius);border:none;background:#378ADD;color:#fff;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;}

     .add-form{background:var(--surface-1);border:0.5px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:1.1rem;display:flex;flex-direction:column;gap:9px;}
     .form-row{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:8px;}
     .field{display:flex;flex-direction:column;gap:4px;}
     .field label{font-size:12px;color:var(--text-muted);}
     .field input,.field select{height:42px;border-radius:var(--radius);border:0.5px solid var(--border-strong);background:var(--surface-2);color:var(--text-primary);font-size:15px;padding:0 12px;font-family:'DM Sans',sans-serif;}
     .field input:focus,.field select:focus{outline:none;border-color:#378ADD;}
     .type-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
     .btn-type{height:42px;border-radius: var(--radius);border:0.5px solid var(--border-strong);background:var(--surface-2);color:var(--text-secondary);font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;transition:all 0.15s;}
     .btn-type.active-income{background:#EAF3DE;color:#27500A;border-color:#97C459;}
     .btn-type.active-expense{background:#FCEBEB;color:#791F1F;border-color:#F09595;}
     .btn-add{height:44px;border-radius:var(--radius);border:none;background: #422e53;color:#fff;font-size:15px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%;}
     .btn-add:hover{background:#185FA5;}

     .tabs{display:flex;gap:4px;margin-bottom:1.1rem;background:var(--surface-1);border-radius:var(--radius);padding:3px;}
     .tab{flex:1;text-align:center;padding:8px;font-size:14px;border-radius:6px;cursor:pointer;color:var(--text-secondary);border:none;background:none;font-family:'DM Sans',sans-serif;}
     .tab.active{background:var(--surface-2);color:var(--text-primary);font-weight:500;border:0.5px solid var(--border);}

     .entries{display:flex;flex-direction:column;gap:7px;}
     .entry{background:var(--surface-2);border:0.5px solid var(--border);border-radius:10px;display:flex;align-items:center;gap:10px;padding:11px 12px;}
     .entry-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
     .entry-icon.income{background:#EAF3DE;}
     .entry-icon.expense{background:#FCEBEB;}
     .entry-name{font-size:15px;color:var(--text-primary);}
     .entry-cat{font-size:12px;color:var(--text-muted);}
     .entry-amount{font-size:15px;font-weight:500;font-family:'DM Mono',monospace;white-space:nowrap;}
     .entry-amount.income{color:#27500A;}
     .entry-amount.expense{color:#791F1F;}
     .btn-del{width:28px;height:28px;border-radius:8px;border:1.5px solid #fff;background:#fff;color:#000;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size: 8px;font-weight: bold; transition:background 0.15s,color 0.15s,border-color 0.15s;line-height:1;}
     .btn-del:hover{background:#E24B4A;color:#fff;border-color:#E24B4A;}

     .empty{text-align:center;padding:2rem 0;color:var(--text-muted);font-size:14px;}

     .month-strip{display:flex;flex-direction:column;gap:7px;}
     .month-row{background:var(--surface-2);border:0.5px solid var(--border);border-radius:10px;padding:10px 12px;}
     .month-row-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
     .month-row-name{font-size:14px;font-weight:500;color:var(--text-primary);}
     .month-row-saved{font-family:'DM Mono',monospace;font-size:14px;color:#27500A;font-weight:500;}
     .month-mini-track{height:5px;background:var(--surface-1);border-radius:99px;overflow:hidden;}
     .month-mini-fill{height:100%;border-radius:99px;background:#639922;}
  </style>
</head>
<body>

  <h2 class="sr-only">Expense and savings tracker with monthly navigation and a savings target.</h2>

  <div class="app">
    <div class="month-header">
      <button class="month-nav" onclick="changeMonth(-1)">◀</button>
      <span class="month-title" id="month-title"></span>
      <button class="month-nav" onclick="changeMonth(1)" aria-label="Next month">▶</button>
    </div>

    <div class="summary-grid">
      <div class="stat income-bg">
        <div class="stat-label income">Income</div>
        <div class="stat-value income" id="total-income">€0</div>
      </div>
      <div class="stat expense-bg">
        <div class="stat-label expense">Expenses</div>
        <div class="stat-value expense" id="total-expense">€0</div>
      </div>
      <div class="stat income-bg" style="background-color: #fff59d;">
         <div class="stat-label income">Month Balance</div>
         <div class="stat-value income" id="balance">€0</div>
      </div>
      
    </div>

    <div class="target-card">
      <div class="target-top">
        <span class="target-label">Savings target</span>
        <button class="target-edit-btn" onclick="toggleTargetEdit()" id="edit-btn">Edit</button>
      </div>
      <div id="target-edit" style="display:none;">
        <div class="target-input-row">
          <input type="number" id="target-input" placeholder="Enter target (€)" min="0" step="1" />
          <button onclick="saveTarget()">Save</button>
        </div>
      </div>
      <div class="target-nums">
        <div class="tnum">
          <div class="tnum-val" id="t-target">€0</div>
          <div class="tnum-lbl">Target</div>
        </div>
        <div class="tnum">
          <div class="tnum-val" id="t-saved">€0</div>
          <div class="tnum-lbl">Saved so far</div>
        </div>
        <div class="tnum">
          <div class="tnum-val" id="t-remaining" style="color:#A32D2D;">€0</div>
          <div class="tnum-lbl">Remaining</div>
        </div>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="target-bar" style="width:0%"></div>
      </div>
    </div>

    <div class="add-form">
      <div class="field">
        <label>Description</label>
        <input id="desc" type="text" placeholder="Coffee, salary, rent…" />
      </div>
      <div class="form-row">
        <div class="field">
          <label>Amount (€)</label>
          <input id="amount" type="number" min="0" step="0.01" placeholder="0.00" />
        </div>
        <div class="field">
          <label>Category</label>
          <select id="cat">
            <option value="Food">Food</option>
            <option value="Housing">Housing</option>
            <option value="Transport">Transport</option>
            <option value="Health">Health</option>
            <option value="Salary">Salary</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>
      <div class="type-row">
        <button class="btn-type active-income" id="btn-income" onclick="setType('income')">+ Income</button>
        <button class="btn-type" id="btn-expense" onclick="setType('expense')">− Expense</button>
      </div>
      <button class="btn-add" onclick="addEntry()">Add entry</button>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('list',this)">Entries</button>
      <button class="tab" onclick="switchTab('months',this)">All months</button>
    </div>

    <div id="tab-list">
      <div class="entries" id="entries-list">
        <div class="empty">No entries this month.</div>
      </div>
    </div>

    <div id="tab-months" style="display:none;">
      <div class="month-strip" id="month-strip"></div>
    </div>
    <div style="display:flex; gap:10px; margin:8px; padding: 4px;">
      <button class="btn-type" onclick="exportData()" style="padding: 4px; height: 24px; font-size:x-small;">Export</button>
      <label class="btn-type" style="display:flex;align-items:center;justify-content:center;cursor:pointer;padding: 4px;height: 24px; font-size: x-small;">
        Import
        <input type="file" id="import-file" accept=".json" style="display:none;" onchange="importData(event)">
      </label>
    </div>
  </div>


  <script>
    const ICONS={Food:'🍽',Housing:'🏠',Transport:'🚗',Health:'💊',Salary:'💼',Other:'📦'};
    const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];

    let data={target:0,entries:[]};
    try{const s=localStorage.getItem('exp_v3');if(s)data=JSON.parse(s);}catch(e){}

    const now=new Date();
    let viewYear=now.getFullYear();
    let viewMonth=now.getMonth();
    let currentType='income';

    function save(){try{localStorage.setItem('exp_v3',JSON.stringify(data));}catch(e){}}
    function fmt(n){return(n < 0 ? '-€':'€'  ) + Math.abs(Math.round(n)).toLocaleString('de-DE');}
    function monthKey(y,m){return y+'-'+String(m+1).padStart(2,'0');}

    function changeMonth(d){
      viewMonth+=d;
      if(viewMonth>11){viewMonth=0;viewYear++;}
      if(viewMonth<0){viewMonth=11;viewYear--;}
      render();
    }

    function setType(t){
      currentType=t;
      document.getElementById('btn-income').className='btn-type'+(t==='income'?' active-income':'');
      document.getElementById('btn-expense').className='btn-type'+(t==='expense'?' active-expense':'');
    }

    function addEntry(){
      const desc=document.getElementById('desc').value.trim();
      const amt=parseFloat(document.getElementById('amount').value);
      const cat=document.getElementById('cat').value;
      if(!desc||!amt||amt<=0)return;
      data.entries.push({id:Date.now(),desc,amount:amt,cat,type:currentType,year:viewYear,month:viewMonth,date:new Date(viewYear,viewMonth,new Date().getDate()).toLocaleDateString('en-GB',{day:'2-digit',month:'short'})});
      document.getElementById('desc').value='';
      document.getElementById('amount').value='';
      save();render();
    }

    function deleteEntry(id){data.entries=data.entries.filter(e=>e.id!==id);save();render();}

    function toggleTargetEdit(){
      const el=document.getElementById('target-edit');
      const open=el.style.display==='none';
      el.style.display=open?'':'none';
      document.getElementById('edit-btn').textContent=open?'Done':'Edit';
      if(open)document.getElementById('target-input').value=data.target||'';
    }

    function saveTarget(){
      const v=parseFloat(document.getElementById('target-input').value);
      if(!isNaN(v)&&v>=0){data.target=v;save();render();}
      toggleTargetEdit();
    }

    function monthSavings(y,m){
      const es=data.entries.filter(e=>e.year===y&&e.month===m);
      const inc=es.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
      const exp=es.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);
      return inc-exp;
    }

    function totalSaved(){
      const keys=new Set(data.entries.map(e=>monthKey(e.year,e.month)));
      let total=0;
      keys.forEach(k=>{
        const[y,m]=k.split('-').map(Number);
        total+=monthSavings(y,m-1);
      });
      return total;
    }
    function exportData() {
    const dataStr = JSON.stringify(data, null, 2);
    const blob = new Blob([dataStr], { type: "application/json" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "expense-backup.json";
    a.click();

    URL.revokeObjectURL(url);
  }

  function importData(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const imported = JSON.parse(e.target.result);
        if (imported.entries) {
          data = imported;
          save();
          render();
          alert("Data imported successfully");
        } else {
          alert("Invalid file");
        }
      } catch {
        alert("Error reading file");
      }
    };
    reader.readAsText(file);
  }

    function render(){
      document.getElementById('month-title').textContent=MONTHS[viewMonth]+' '+viewYear;

      const curEntries=data.entries.filter(e=>e.year===viewYear&&e.month===viewMonth);
      const income=curEntries.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
      const expense=curEntries.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);

      document.getElementById('total-income').textContent=fmt(income);
      document.getElementById('total-expense').textContent=fmt(expense);
      document.getElementById('balance').textContent = fmt(income - expense)

      const saved=Math.max(0,totalSaved());
      const target=data.target||0;
      const remaining=Math.max(0,target-saved);
      const pct=target>0?Math.min(100,Math.round((saved/target)*100)):0;

      document.getElementById('t-target').textContent=fmt(target);
      document.getElementById('t-saved').textContent=fmt(saved);
      document.getElementById('t-remaining').textContent=remaining===0&&target>0?'✓ Reached!':fmt(remaining);
      document.getElementById('t-remaining').style.color=remaining===0&&target>0?'#27500A':'#A32D2D';
      document.getElementById('target-bar').style.width=pct+'%';

      const list=document.getElementById('entries-list');
      if(!curEntries.length){
        list.innerHTML='<div class="empty">No entries for '+MONTHS[viewMonth]+'.</div>';
      } else {
        list.innerHTML=[...curEntries].reverse().map(e=>`
          <div class="entry">
            <div class="entry-icon ${e.type}">${ICONS[e.cat]||'📦'}</div>
            <div style="flex:1;min-width:0;">
              <div class="entry-name">${e.desc}</div>
              <div class="entry-cat">${e.cat} · ${e.date}</div>
            </div>
            <div class="entry-amount ${e.type}">${e.type==='income'?'+':'-'}${fmt(e.amount)}</div>
            <button class="btn-del" onclick="deleteEntry(${e.id}) "aria-label="Remove entry"> ✕</button>
          </div>
        `).join('');
      }

      const allKeys=[...new Set(data.entries.map(e=>monthKey(e.year,e.month)))].sort().reverse();
      const strip=document.getElementById('month-strip');
      if(!allKeys.length){
        strip.innerHTML='<div class="empty">No data yet.</div>';
      } else {
        strip.innerHTML=allKeys.map(k=>{
          const[y,m]=k.split('-').map(Number);
          const s=monthSavings(y,m-1);
          const pctM=target>0?Math.min(100,Math.max(0,Math.round((s/target)*100))):0;
          const label=MONTHS[m-1].slice(0,3)+' '+y;
          return`<div class="month-row">
            <div class="month-row-top">
              <span class="month-row-name">${label}</span>
              <span class="month-row-saved" style="color:${s>=0?'#27500A':'#791F1F'}">${s>=0?'+':'-'}${fmt(s)}</span>
            </div>
            ${target>0?`<div class="month-mini-track"><div class="month-mini-fill" style="width:${pctM}%"></div></div>`:''}
          </div>`;
        }).join('');
      }
    }

    document.getElementById('desc').addEventListener('keydown',e=>{if(e.key==='Enter')addEntry();});
    document.getElementById('amount').addEventListener('keydown',e=>{if(e.key==='Enter')addEntry();});
    render();
  </script>
</body>
</html>
